name: Build & publish

# comsar is pure Python, so a single universal wheel + sdist is enough.
# Published to PyPI on every version tag (e.g. `v0.0.3`) via Trusted Publishing
# (no API token stored). Configure the trusted publisher once on PyPI:
#   PyPI project (bader-comsar) -> Settings -> Publishing -> Add pending publisher
#   owner=bader28, repo=comsar, workflow=wheels.yml, environment=pypi
#
# Trigger a release:  git tag v0.0.3 && git push github v0.0.3

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: pipx run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
